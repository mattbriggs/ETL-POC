site_name: DITA ETL Pipeline
site_description: Composable pipeline for converting source documents to DITA XML
site_author: Heretto
repo_url: https://github.com/your-org/ETL-POC
docs_dir: site
site_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: sphinx
            show_source: true
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - User Guide: user-guide.md
  - Architecture: pipeline.md
  - Stages: stages.md
  - Configuration: configuration.md
  - API Reference:
      - Contracts: api/contracts.md
      - Config: api/config.md
      - Pipeline: api/pipeline.md
      - Transforms: api/transforms.md
      - Assess: api/assess.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
