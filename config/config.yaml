tooling:
  pandoc_path: /usr/local/bin/pandoc
  oxygen_scripts_dir: /Applications/oxygen/scripts
  java_path: /usr/bin/java
  saxon_jar: /opt/saxon/saxon9he.jar

source_formats:
  treat_as_html:
    - ".html"
    - ".htm"

extract:
  handler_overrides:
    ".html": "pandoc-html"

dita_output:
  output_folder: build/job02/
  map_title: "ApplePages - HTML to DITA"

classification_rules:
  by_filename:
    - match: "index"
      type: "concept"
    - match: "guide"
      type: "task"
  by_content:
    - match: "procedure"
      type: "task"